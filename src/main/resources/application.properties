spring.application.name=secureApp
# The format used for the keystore. It could be set to JKS in case it is a JKS file
server.ssl.key-store-type=PKCS12
# The path to the keystore containing the certificate
server.ssl.key-store=classpath:keystore/keystore.p12
# The password used to generate the certificate
server.ssl.key-store-password=123456
# The alias mapped to the certificate
server.ssl.key-alias=springapache.duckdns.org
server.ssl.enabled=true

# Support X-Forwarded-* headers when running behind reverse proxies.
server.forward-headers-strategy=framework

# CORS: allow requests only from the expected frontend origin.
app.security.allowed-origin=https://labtdsecristian.duckdns.org


# Base64-encoded secret key for HS256 (must be at least 256 bits).
security.jwt.secret=TXlTdXBlclNlY3JldEtleUZvckpXVFNpZ25pbmdUaGF0SXNMb25nRW5vdWdoMTIzNDU2
security.jwt.expiration-ms=3600000
